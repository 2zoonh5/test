<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERU ADMIN 🔐</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { 
        extend: {
          colors: { 
            bg: 'var(--bg)', 
            themePurple: 'var(--theme-purple)', 
            textPurple: '#8C7AE6',
            brandDark: 'var(--brand-dark)', 
            brandSub: 'var(--brand-sub)', 
            line: 'var(--line)' 
          },
          fontFamily: { 
            sans: ['Pretendard', 'sans-serif'], 
            montserrat: ['Montserrat', 'sans-serif'] 
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --bg: #F9F8FC;
      --card-bg: #FFFFFF;
      --input-bg: #F9F8FC;
      --theme-purple: #DAD1FE;
      --brand-dark: #1E1B2C;
      --brand-sub: #6E6B7B;
      --line: rgba(218, 209, 254, 0.4);
    }

    body.dark {
      --bg: #0F0D15;
      --card-bg: #181524;
      --input-bg: #120F1D;
      --theme-purple: #3A3258;
      --brand-dark: #F1EDF8;
      --brand-sub: #A39EB2;
      --line: rgba(140, 122, 230, 0.25);
    }

    body {
      background-color: var(--bg);
      color: var(--brand-dark);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* 💡 다크모드 시 달력 / 시계 아이콘 흰색 강제 변경 (body, html 이중 지정) */
    body.dark input[type="date"],
    body.dark input[type="time"],
    body.dark select,
    html.dark input[type="date"],
    html.dark input[type="time"],
    html.dark select {
      color-scheme: dark !important;
    }

    body.dark input[type="date"]::-webkit-calendar-picker-indicator,
    body.dark input[type="time"]::-webkit-calendar-picker-indicator,
    html.dark input[type="date"]::-webkit-calendar-picker-indicator,
    html.dark input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) !important;
      cursor: pointer;
      opacity: 0.9;
    }

    .custom-modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(15, 13, 21, 0.65);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      padding: 20px;
    }
    .custom-modal-backdrop.open { display: flex; }
    .custom-modal-content {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 28px;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-[var(--bg)] min-h-screen font-sans text-[var(--brand-dark)] pb-20">

  <!-- 로그인 인증 화면 -->
  <div id="loginView" class="min-h-screen flex flex-col items-center justify-center px-4 relative">
    <a href="../" class="inline-flex items-center gap-2 mb-6 px-4 py-2 rounded-full bg-[var(--card-bg)] border border-[var(--line)] text-xs font-bold text-[var(--brand-sub)] hover:text-[var(--brand-dark)] transition shadow-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      메인으로 돌아가기
    </a>

    <div class="bg-[var(--card-bg)] border border-[var(--line)] rounded-3xl p-8 max-w-sm w-full shadow-xl text-center">
      <div class="w-12 h-12 bg-themePurple/30 text-textPurple rounded-2xl flex items-center justify-center text-xl mx-auto mb-4 font-bold">🔒</div>
      <h2 class="text-xl font-bold font-montserrat tracking-wider mb-1">SERU ADMIN</h2>
      <p class="text-xs text-[var(--brand-sub)] mb-6">스트리머 관리자 인증이 필요합니다</p>
      
      <form onsubmit="handleLogin(event)" class="space-y-4">
        <input type="password" id="adminPassword" placeholder="관리자 비밀번호 입력" class="w-full h-12 px-4 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-sm bg-[var(--input-bg)] text-[var(--brand-dark)]">
        <button type="submit" class="w-full h-12 bg-textPurple hover:bg-[#7B67DC] text-white font-bold text-sm rounded-xl transition shadow-md shadow-textPurple/20">로그인</button>
      </form>
    </div>
  </div>

  <!-- 관리자 대시보드 화면 -->
  <div id="adminView" class="hidden max-w-3xl mx-auto px-6 pt-10">
    <div class="flex items-center justify-between pb-6 mb-8 border-b border-[var(--line)]">
      <div>
        <div class="text-xs font-bold text-textPurple tracking-widest font-montserrat uppercase">ADMIN PANEL</div>
        <h1 class="text-2xl font-bold mt-0.5">방송 대시보드 관리자</h1>
      </div>
      
      <div class="flex items-center gap-2">
        <a href="../" class="text-xs font-bold text-[var(--brand-sub)] hover:text-[var(--brand-dark)] px-3.5 py-2 rounded-full border border-[var(--line)] bg-[var(--card-bg)] transition">메인으로 이동</a>
        
        <button onclick="handleLogout()" class="text-xs font-bold text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/40 px-3.5 py-2 rounded-full border border-red-200 dark:border-red-900/40 bg-[var(--card-bg)] transition">로그아웃</button>

        <button id="themeToggle" class="w-9 h-9 rounded-full bg-[var(--card-bg)] border border-[var(--line)] flex items-center justify-center text-xs hover:border-textPurple transition shadow-sm ml-1" aria-label="다크모드 토글">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </div>

    <!-- 링크 수정 카드 -->
    <div class="bg-[var(--card-bg)] border border-[var(--line)] rounded-3xl p-6 shadow-sm mb-8">
      <h3 class="text-base font-bold mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-textPurple"></span>메인 메뉴 링크 설정
      </h3>
      
      <form onsubmit="saveLinks(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">노래책 URL</label>
          <input type="url" id="musicbook_url" required placeholder="https://meloming.com/..." class="w-full h-11 px-4 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-xs bg-[var(--input-bg)] text-[var(--brand-dark)]">
        </div>
        <div>
          <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">업보 URL (구글 스프레드시트)</label>
          <input type="url" id="karma_url" required placeholder="https://docs.google.com/..." class="w-full h-11 px-4 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-xs bg-[var(--input-bg)] text-[var(--brand-dark)]">
        </div>
        
        <button type="submit" class="w-full h-12 bg-textPurple hover:bg-[#7B67DC] text-white font-bold text-sm rounded-xl transition shadow-lg shadow-textPurple/20">
          링크 수정 저장
        </button>
      </form>
    </div>

    <!-- 새 일정 등록 폼 -->
    <div class="bg-[var(--card-bg)] border border-[var(--line)] rounded-3xl p-6 shadow-sm mb-10">
      <h3 class="text-base font-bold mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-textPurple"></span>새 일정 등록
      </h3>
      
      <form onsubmit="saveSchedule(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">일정 제목 *</label>
          <input type="text" id="title" required placeholder="예: 배그 벽킬내기 합방" class="w-full h-11 px-4 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-sm bg-[var(--input-bg)] text-[var(--brand-dark)]">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div>
            <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">시작일 *</label>
            <input type="date" id="event_date" required class="w-full h-11 px-3 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-xs bg-[var(--input-bg)] text-[var(--brand-dark)]">
          </div>
          <div>
            <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">종료일 (선택, 기간일정)</label>
            <input type="date" id="end_date" class="w-full h-11 px-3 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-xs bg-[var(--input-bg)] text-[var(--brand-dark)]">
          </div>
          <div>
            <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">시작 시간 (선택)</label>
            <input type="time" id="event_time" class="w-full h-11 px-3 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-xs bg-[var(--input-bg)] text-[var(--brand-dark)]">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">일정 유형 *</label>
            <select id="event_type" class="w-full h-11 px-3 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-xs bg-[var(--input-bg)] text-[var(--brand-dark)]">
              <option value="broadcast">방송 (파스텔 퍼플)</option>
              <option value="off">휴방 (쿨그레이)</option>
              <option value="event">이벤트 (피치 핑크)</option>
              <option value="collab">합방 (소프트 민트)</option>
              <option value="tournament">대회 (파스텔 블루)</option>
              <option value="other">기타 (살구 크림)</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-[var(--brand-sub)] mb-1">상세 내용 (선택)</label>
          <textarea id="description" rows="3" placeholder="팝업 모달에 노출될 상세 설명 문구를 적어주세요." class="w-full p-4 rounded-xl border border-[var(--line)] focus:outline-none focus:border-textPurple text-xs bg-[var(--input-bg)] text-[var(--brand-dark)]"></textarea>
        </div>

        <button type="submit" class="w-full h-12 bg-textPurple hover:bg-[#7B67DC] text-white font-bold text-sm rounded-xl transition shadow-lg shadow-textPurple/20">
          일정 등록하기
        </button>
      </form>
    </div>

    <!-- 등록된 일정 리스트 -->
    <div>
      <h3 class="text-base font-bold mb-4">등록된 일정 목록</h3>
      <div id="scheduleList" class="space-y-3"></div>
    </div>
  </div>

  <div id="customModal" class="custom-modal-backdrop">
    <div class="custom-modal-content text-center">
      <div id="modalIcon" class="w-12 h-12 rounded-2xl bg-themePurple/30 text-textPurple flex items-center justify-center text-xl mx-auto mb-3 font-bold">✨</div>
      <h3 id="modalTitleText" class="text-lg font-bold text-[var(--brand-dark)] mb-1">알림</h3>
      <p id="modalMsgText" class="text-xs text-[var(--brand-sub)] leading-relaxed mb-6"></p>
      <div id="modalButtons" class="flex gap-2">
        <button id="modalConfirmBtn" class="w-full h-11 bg-textPurple text-white font-bold text-xs rounded-xl shadow-md shadow-textPurple/20 transition">확인</button>
      </div>
    </div>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script>
    const ADMIN_PW = "seru1234";

    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    function applyTheme(isDark) {
      if (isDark) {
        document.body.classList.add('dark');
        document.documentElement.classList.add('dark');
        themeIcon.textContent = '☀️';
      } else {
        document.body.classList.remove('dark');
        document.documentElement.classList.remove('dark');
        themeIcon.textContent = '🌙';
      }
    }

    if (localStorage.getItem('seru_theme') === 'dark') {
      applyTheme(true);
    }

    toggleBtn.addEventListener('click', () => {
      const isDark = !document.body.classList.contains('dark');
      applyTheme(isDark);
      localStorage.setItem('seru_theme', isDark ? 'dark' : 'light');
    });

    document.addEventListener("DOMContentLoaded", () => {
      if (sessionStorage.getItem("seru_admin_logged") === "true") {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('adminView').classList.remove('hidden');
        loadLinks();
        loadAdminSchedules();
      }
    });

    function showAlert(title, msg, icon = "✨") {
      document.getElementById('modalIcon').textContent = icon;
      document.getElementById('modalTitleText').textContent = title;
      document.getElementById('modalMsgText').textContent = msg;
      
      const btnArea = document.getElementById('modalButtons');
      btnArea.innerHTML = `<button onclick="closeCustomModal()" class="w-full h-11 bg-textPurple text-white font-bold text-xs rounded-xl shadow-md shadow-textPurple/20">확인</button>`;
      
      document.getElementById('customModal').classList.add('open');
    }

    function showConfirm(title, msg, onConfirm) {
      document.getElementById('modalIcon').textContent = "❓";
      document.getElementById('modalTitleText').textContent = title;
      document.getElementById('modalMsgText').textContent = msg;
      
      const btnArea = document.getElementById('modalButtons');
      btnArea.innerHTML = `
        <button onclick="closeCustomModal()" class="w-1/2 h-11 bg-[var(--input-bg)] text-[var(--brand-dark)] font-bold text-xs rounded-xl border border-[var(--line)] hover:opacity-80 transition">취소</button>
        <button id="confirmYesBtn" class="w-1/2 h-11 bg-[#E55353] hover:bg-[#D44242] text-white font-bold text-xs rounded-xl shadow-md shadow-red-900/30 transition">삭제하기</button>
      `;
      
      document.getElementById('customModal').classList.add('open');
      document.getElementById('confirmYesBtn').onclick = () => {
        closeCustomModal();
        onConfirm();
      };
    }

    function closeCustomModal() {
      document.getElementById('customModal').classList.remove('open');
    }

    function handleLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('adminPassword').value;
      if (pw === ADMIN_PW) {
        sessionStorage.setItem("seru_admin_logged", "true");
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('adminView').classList.remove('hidden');
        loadLinks();
        loadAdminSchedules();
      } else {
        showAlert("인증 실패", "비밀번호가 올바르지 않습니다.", "🔒");
      }
    }

    function handleLogout() {
      sessionStorage.removeItem("seru_admin_logged");
      location.reload();
    }

    async function loadLinks() {
      try {
        const { data, error } = await supabaseClient.from('settings').select('*');
        if (error) throw error;
        
        data.forEach(item => {
          if (item.key === 'musicbook_url') document.getElementById('musicbook_url').value = item.value;
          if (item.key === 'karma_url') document.getElementById('karma_url').value = item.value;
        });
      } catch (err) { console.error(err); }
    }

    async function saveLinks(e) {
      e.preventDefault();
      const musicbook = document.getElementById('musicbook_url').value;
      const karma = document.getElementById('karma_url').value;

      try {
        await supabaseClient.from('settings').upsert([
          { key: 'musicbook_url', value: musicbook },
          { key: 'karma_url', value: karma }
        ]);
        showAlert("저장 완료", "노래책 및 업보 링크가 성공적으로 수정되었습니다!", "🔗");
      } catch (err) {
        showAlert("저장 실패", err.message, "⚠️");
      }
    }

    async function loadAdminSchedules() {
      const list = document.getElementById('scheduleList');
      try {
        const { data, error } = await supabaseClient.from('schedules').select('*').order('event_date', { ascending: false });
        if (error) throw error;
        
        if (!data.length) {
          list.innerHTML = '<div class="text-center py-8 text-xs text-[var(--brand-sub)] bg-[var(--card-bg)] rounded-2xl border border-[var(--line)]">등록된 일정이 없습니다.</div>';
          return;
        }

        list.innerHTML = data.map(item => `
          <div class="flex items-center justify-between p-4 bg-[var(--card-bg)] rounded-2xl border border-[var(--line)] transition-colors">
            <div>
              <div class="font-bold text-sm text-[var(--brand-dark)]">${item.title}</div>
              <div class="text-xs text-[var(--brand-sub)] mt-1 font-montserrat">
                ${item.event_date}${item.end_date ? ' ~ ' + item.end_date : ''} 
                ${item.event_time ? ' · ' + item.event_time.slice(0,5) : ''}
              </div>
            </div>
            <button onclick="deleteSchedule('${item.id}')" class="text-xs font-bold text-red-500 dark:text-red-400 bg-red-50/50 dark:bg-red-950/40 hover:bg-red-100 dark:hover:bg-red-900/60 px-3.5 py-1.5 rounded-lg border border-red-200 dark:border-red-900/40 transition">삭제</button>
          </div>
        `).join('');
      } catch (err) { console.error(err); }
    }

    async function saveSchedule(e) {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const event_date = document.getElementById('event_date').value;
      const end_date = document.getElementById('end_date').value || null;
      const event_time = document.getElementById('event_time').value || null;
      const event_type = document.getElementById('event_type').value;
      const description = document.getElementById('description').value;

      try {
        const { error } = await supabaseClient.from('schedules').insert([
          { title, event_date, end_date, event_time, event_type, description }
        ]);

        if (error) throw error;
        showAlert("등록 완료", "새로운 방송 일정이 등록되었습니다!", "📅");
        e.target.reset();
        loadAdminSchedules();
      } catch (err) {
        showAlert("등록 실패", err.message, "⚠️");
      }
    }

    function deleteSchedule(id) {
      showConfirm("일정 삭제", "정말로 이 일정을 삭제하시겠습니까?", async () => {
        try {
          const { error } = await supabaseClient.from('schedules').delete().eq('id', id);
          if (error) throw error;
          showAlert("삭제 완료", "일정이 정상적으로 삭제되었습니다.", "🗑️");
          loadAdminSchedules();
        } catch (err) {
          showAlert("삭제 실패", err.message, "⚠️");
        }
      });
    }
  </script>
</body>
</html>
