<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERU SCHEDULE 💜</title>
  
  <!-- 투명한 보라색 하트 이모지 파비콘 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💜</text></svg>">
  
  <!-- Tailwind CSS & Premium Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    tailwind.config = {
      theme: { 
        extend: {
          colors: { 
            bg: '#F9F8FC', 
            themePurple: '#DAD1FE', 
            textPurple: '#8C7AE6',
            brandDark: '#1E1B2C', 
            brandSub: '#6E6B7B', 
            line: 'rgba(218, 209, 254, 0.4)' 
          },
          fontFamily: { 
            sans: ['Pretendard', 'sans-serif'], 
            montserrat: ['Montserrat', 'sans-serif'] 
          }
        }
      }
    }
  </script>
  
  <style>
    body {
      background-color: #F9F8FC;
      color: #1E1B2C;
      letter-spacing: -0.02em;
    }
    html { scroll-behavior: smooth; }
    
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #F9F8FC; }
    ::-webkit-scrollbar-thumb { background: #DAD1FE; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #C0B5FC; }

    /* ---- index.html과 100% 일치하도록 보완된 플로팅 네비게이션 링크 ---- */
    .nav-link {
      font-size: 0.875rem;
      font-weight: 600;
      color: #6E6B7B;
      padding: 8px 24px;
      border-radius: 99px;
      transition: all 0.3s ease;
    }
    .nav-link:hover {
      color: #1E1B2C;
      background: rgba(218, 209, 254, 0.4);
    }
    .nav-link.active {
      color: #1E1B2C;
      background: #DAD1FE;
      box-shadow: 0 4px 15px rgba(218, 209, 254, 0.4);
    }

    /* ---- Desktop Calendar Grid ---- */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .cal-header { text-align: center; font-size: .8125rem; font-weight: 700; color: #6E6B7B; padding: 12px 0; font-family: 'Montserrat', sans-serif; }
    .cal-header:first-child { color: #D4727A; } /* 일요일 */
    .cal-header:last-child { color: #7BA0D4; }  /* 토요일 */
    
    .cal-cell { 
      min-height: 110px; 
      background: #ffffff; 
      border-radius: 16px; 
      border: 1px solid rgba(218, 209, 254, 0.4); 
      padding: 10px; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
      cursor: default; 
      overflow: hidden; 
      min-width: 0;
    }
    .cal-cell:hover { 
      border-color: #DAD1FE; 
      box-shadow: 0 10px 25px rgba(218, 209, 254, 0.15); 
      transform: translateY(-2px);
    }
    .cal-cell.empty { background: transparent; border-color: transparent; }
    .cal-cell.empty:hover { box-shadow: none; transform: none; }
    .cal-cell.today { border-color: #9F8FFF; box-shadow: 0 0 0 1.5px #9F8FFF; }
    
    .cal-day-num { font-size: .875rem; font-weight: 700; color: #1E1B2C; margin-bottom: 6px; font-family: 'Montserrat', sans-serif; }
    .cal-cell:nth-child(7n+1) .cal-day-num { color: #D4727A; }
    .cal-cell:nth-child(7n) .cal-day-num { color: #7BA0D4; }
    
    .cal-event { 
      display: block; 
      width: 100%; 
      font-size: .75rem; 
      padding: 4px 8px; 
      border-radius: 8px; 
      margin-bottom: 4px; 
      color: #1E1B2C; 
      font-weight: 600; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      cursor: pointer; 
      transition: opacity .2s; 
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .cal-event:hover { opacity: .85; }
    .cal-cell.past { opacity: .45; }
    .cal-cell.past:hover { opacity: .8; }

    /* ---- Mobile List View ---- */
    .list-date-group { margin-bottom: 20px; }
    .list-date-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding: 0 4px; }
    .list-day-num { 
      width: 44px; height: 44px; 
      border-radius: 14px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: #ffffff; 
      border: 1px solid rgba(218, 209, 254, 0.4); 
      font-weight: 700; font-size: 1.1rem; 
      color: #1E1B2C;
      font-family: 'Montserrat', sans-serif;
    }
    .list-day-num.today { background: #DAD1FE; color: #1E1B2C; border-color: #DAD1FE; }
    .list-day-num.sunday { color: #D4727A; }
    .list-day-num.saturday { color: #7BA0D4; }
    .list-day-num.today.sunday, .list-day-num.today.saturday { color: #1E1B2C; }
    .list-day-label { font-size: .8125rem; font-weight: 600; color: #6E6B7B; }
    
    .list-event-item { 
      display: flex; align-items: center; gap: 16px; 
      padding: 16px; 
      background: #ffffff; 
      border-radius: 16px; 
      border: 1px solid rgba(218, 209, 254, 0.3); 
      margin-bottom: 8px; 
      transition: all 0.2s ease; 
      cursor: pointer;
    }
    .list-event-item:hover { 
      border-color: #DAD1FE; 
      box-shadow: 0 8px 20px rgba(218, 209, 254, 0.1); 
    }
    .list-event-bar { width: 4px; height: 36px; border-radius: 99px; flex-shrink: 0; }
    .list-event-info { flex: 1; min-width: 0; }
    .list-event-title { font-size: .95rem; font-weight: 700; color: #1E1B2C; }
    .list-event-time { font-size: .8rem; color: #6E6B7B; margin-top: 2px; }
    .list-event-badge { font-size: .75rem; padding: 4px 12px; border-radius: 999px; font-weight: 600; flex-shrink: 0; }

    .list-date-group.past { opacity: .5; }
    .list-date-group.past .list-event-item { background: #fafafa; }

    /* Today divider */
    .today-divider { display: flex; align-items: center; gap: 16px; margin: 24px 0 16px; padding: 0 4px; }
    .today-divider::before, .today-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #DAD1FE, transparent); }
    .today-divider span { font-size: .75rem; font-weight: 700; color: #6E6B7B; white-space: nowrap; letter-spacing: 2px; font-family: 'Montserrat', sans-serif; }

    .desktop-only { display: block; }
    .mobile-only { display: none; }
    @media(max-width:768px){
      .desktop-only { display: none; }
      .mobile-only { display: block; }
    }

    /* ---- Modal ---- */
    .modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(30, 27, 44, 0.2); display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-backdrop.open { display: flex; }
    .modal-content { background: #ffffff; border-radius: 28px; padding: 32px; max-width: 440px; width: 90%; border: 1px solid rgba(218, 209, 254, 0.5); box-shadow: 0 24px 60px rgba(30, 27, 44, 0.15); }
    .legend-dot { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
  </style>
</head>
<body class="bg-bg min-h-screen font-sans pb-32">

  <!-- FLOATING HEADER & NAVIGATION -->
  <div class="sticky top-4 z-50 px-6 max-w-4xl mx-auto">
    <header class="bg-white/70 backdrop-blur-lg border border-line/50 h-20 rounded-full px-8 flex items-center justify-between shadow-lg shadow-brandDark/5">
      <div class="font-montserrat text-xl font-bold tracking-wider text-brandDark">
        SERU<span class="text-textPurple">.</span>
      </div>
      <nav class="flex gap-1">
        <a href="../" class="nav-link">프로필</a>
        <a href="#" class="nav-link active">일정</a>
        <a href="https://meloming.com/channel/yourseru/musicbook" class="nav-link" target="_blank">노래책</a>
        <a href="https://docs.google.com/spreadsheets/d/1URD9MiS3Fqc2oMzrKh4k7EwGUZDWU7q40D2YLCKXSnc/edit?usp=sharing" class="nav-link" target="_blank">업보</a>
      </nav>
    </header>
  </div>

  <main class="max-w-4xl mx-auto px-6 mt-12 pb-24">
    <!-- Month Navigation -->
    <section class="pb-6">
      <div class="flex items-center justify-between mb-8">
        <button onclick="changeMonth(-1)" class="w-11 h-11 rounded-full bg-white border border-line/50 flex items-center justify-center text-brandDark hover:bg-[#FAF9FF] transition shadow-sm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2 id="calMonth" class="text-2xl font-bold text-brandDark font-montserrat tracking-tight"></h2>
        <button onclick="changeMonth(1)" class="w-11 h-11 rounded-full bg-white border border-line/50 flex items-center justify-center text-brandDark hover:bg-[#FAF9FF] transition shadow-sm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      
      <!-- Legend (새로운 색상 팔레트로 업데이트) -->
      <div class="flex flex-wrap items-center justify-center gap-6 mb-4 desktop-only">
        <div class="flex items-center gap-2.5"><div class="legend-dot" style="background:#D1C4FF"></div><span class="text-xs font-semibold text-brandSub">방송</span></div>
        <div class="flex items-center gap-2.5"><div class="legend-dot" style="background:#E2E0E8"></div><span class="text-xs font-semibold text-brandSub">휴방</span></div>
        <div class="flex items-center gap-2.5"><div class="legend-dot" style="background:#FFD1E3"></div><span class="text-xs font-semibold text-brandSub">이벤트</span></div>
        <div class="flex items-center gap-2.5"><div class="legend-dot" style="background:#C3F0E6"></div><span class="text-xs font-semibold text-brandSub">합방</span></div>
        <div class="flex items-center gap-2.5"><div class="legend-dot" style="background:#C2E0FF"></div><span class="text-xs font-semibold text-brandSub">대회</span></div>
        <div class="flex items-center gap-2.5"><div class="legend-dot" style="background:#FFE3C5"></div><span class="text-xs font-semibold text-brandSub">기타</span></div>
      </div>
    </section>

    <!-- Desktop: Calendar Grid -->
    <section class="desktop-only mb-12">
      <div class="cal-grid mb-3">
        <div class="cal-header">SUN</div><div class="cal-header">MON</div><div class="cal-header">TUE</div><div class="cal-header">WED</div><div class="cal-header">THU</div><div class="cal-header">FRI</div><div class="cal-header">SAT</div>
      </div>
      <div class="cal-grid" id="calBody"></div>
    </section>

    <!-- Mobile: List View -->
    <section class="mobile-only mb-8">
      <div id="listBody"></div>
    </section>

    <!-- Upcoming (desktop only) -->
    <section class="mt-12 desktop-only">
      <h3 class="text-lg font-bold text-brandDark mb-6 tracking-tight">이후 예정된 일정</h3>
      <div id="upcomingList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </section>
  </main>

  <!-- Modal -->  
  <div class="modal-backdrop" id="eventModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="flex items-start justify-between mb-6">
        <div class="flex items-center gap-2">
          <div id="modalColor" class="w-3.5 h-3.5 rounded-full"></div>
          <span id="modalType" class="text-xs font-bold text-brandSub uppercase tracking-wider font-montserrat"></span>
        </div>
        <button onclick="document.getElementById('eventModal').classList.remove('open')" class="text-brandSub hover:text-brandDark transition">✕</button>
      </div>
      <h3 id="modalTitle" class="text-xl font-bold text-brandDark mb-3"></h3>
      <div class="space-y-1 mb-6">
        <p id="modalDate" class="text-xs font-semibold text-brandSub"></p>
        <p id="modalTime" class="text-xs font-semibold text-brandSub font-montserrat"></p>
      </div>
      <p id="modalDesc" class="text-sm text-brandSub leading-relaxed bg-[#F9F8FC] p-4 rounded-xl border border-line/30"></p>
    </div>
  </div>

  <footer class="text-center py-16 text-brandSub/60 text-xs font-semibold border-t border-line/40">
    <p class="font-montserrat tracking-wider">© 2026 SERU. ALL RIGHTS RESERVED.</p>
  </footer>

  <script src="../js/supabase-config.js"></script>  
  <script>
    let currentYear, currentMonth;
    let schedules = [];
    const DAYS = ['일','월','화','수','목','금','토'];
    
    // 💡 개편된 카테고리별 색상값 (TYPE_COLORS)
    const TYPE_COLORS = {
      'broadcast':  '#D1C4FF', // 방송 (파스텔 퍼플)
      'off':        '#E2E0E8', // 휴방 (쿨그레이)
      'event':      '#FFD1E3', // 이벤트 (피치 핑크)
      'collab':     '#C3F0E6', // 합방 (소프트 민트)
      'tournament': '#C2E0FF', // 대회 (파스텔 블루)
      'other':      '#FFE3C5'  // 기타 (살구 크림)
    };

    const TYPE_LABELS = {
      'broadcast':  '방송',
      'off':        '휴방', 
      'event':      '이벤트',
      'collab':     '합방',
      'tournament': '대회',
      'other':      '기타'
    };

    function init() {
      const n = new Date();
      currentYear = n.getFullYear();
      currentMonth = n.getMonth();
      loadMonth();
    }

    async function loadMonth() {
      document.getElementById('calMonth').textContent = `${currentYear}년 ${currentMonth + 1}월`;
      const s = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
      const e = new Date(currentYear, currentMonth+1, 0);
      const eStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(e.getDate()).padStart(2,'0')}`;
      try {
        const { data, error } = await supabaseClient.from('schedules').select('*')
          .gte('event_date', s).lte('event_date', eStr)
          .order('event_date').order('event_time');
        if (error) throw error;
        schedules = data || [];
      } catch(e) { console.error(e); schedules = []; }
      renderCalendar();
      renderListView();
      renderUpcoming();
    }

    function renderCalendar() {
      const body = document.getElementById('calBody');
      body.innerHTML = '';
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
      const today = new Date();

      for (let i = 0; i < firstDay; i++) body.innerHTML += '<div class="cal-cell empty"></div>';

      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
        const isPast = (currentYear < today.getFullYear()) || (currentYear === today.getFullYear() && currentMonth < today.getMonth()) || (currentYear === today.getFullYear() && currentMonth === today.getMonth() && d < today.getDate());
        const dayEv = schedules.filter(s => s.event_date === ds);
        let evH = '';
        dayEv.forEach(ev => {
          const c = ev.color || TYPE_COLORS[ev.event_type] || '#DAD1FE';
          const t = ev.event_time ? ev.event_time.slice(0,2).replace(/^0/,'')+'시 ' : '';
          evH += `<div class="cal-event" style="background:${c}" onclick="showEvent('${ev.id}')" title="${ev.title}">${t}${ev.title}</div>`;
        });
        let cellClass = 'cal-cell';
        if (isToday) cellClass += ' today';
        if (isPast) cellClass += ' past';
        body.innerHTML += `<div class="${cellClass}"><div class="cal-day-num">${d}</div>${evH}</div>`;
      }
    }

    function renderListView() {
      const body = document.getElementById('listBody');
      const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const isCurrentMonth = today.getFullYear()===currentYear && today.getMonth()===currentMonth;
      let html = '';
      let todayInserted = false;

      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayEv = schedules.filter(s => s.event_date === ds);
        if (dayEv.length === 0) continue;

        const date = new Date(currentYear, currentMonth, d);
        const dayOfWeek = date.getDay();
        const isToday = isCurrentMonth && today.getDate()===d;
        const isPast = ds < todayStr;

        if (isCurrentMonth && !todayInserted && ds >= todayStr) {
          html += `<div class="today-divider" id="todayAnchor"><span>TODAY</span></div>`;
          todayInserted = true;
        }

        let dayClass = 'list-day-num';
        if (isToday) dayClass += ' today';
        if (dayOfWeek === 0) dayClass += ' sunday';
        if (dayOfWeek === 6) dayClass += ' saturday';

        const groupClass = isPast ? 'list-date-group past' : 'list-date-group';

        html += `<div class="${groupClass}">`;
        html += `<div class="list-date-header">`;
        html += `<div class="${dayClass}">${d}</div>`;
        html += `<div class="list-day-label">${DAYS[dayOfWeek]}요일${isToday ? ' · 오늘' : ''}</div>`;
        html += `</div>`;

        dayEv.forEach(ev => {
          const c = ev.color || TYPE_COLORS[ev.event_type] || '#DAD1FE';
          const l = TYPE_LABELS[ev.event_type] || ev.event_type;
          const t = ev.event_time ? ev.event_time.slice(0,5) : '';
          html += `
            <div class="list-event-item" onclick="showEvent('${ev.id}')">
              <div class="list-event-bar" style="background:${c}"></div>
              <div class="list-event-info">
                <div class="list-event-title">${ev.title}</div>
                ${t ? `<div class="list-event-time">${t}</div>` : ''}
              </div>
              <span class="list-event-badge" style="background:${c}25;color:#1E1B2C">${l}</span>
            </div>`;
        });
        html += `</div>`;
      }

      if (!todayInserted && isCurrentMonth) {
        html += `<div class="today-divider" id="todayAnchor"><span>TODAY</span></div>`;
        html += '<div class="text-center py-12 text-brandSub text-sm font-semibold">예정된 방송 일정이 없습니다.</div>';
      }

      if (!html) {
        html = '<div class="text-center py-16 text-brandSub text-sm font-semibold">이번 달에 등록된 일정이 존재하지 않습니다.</div>';
      }

      body.innerHTML = html;

      setTimeout(() => {
        const anchor = document.getElementById('todayAnchor');
        if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    function renderUpcoming() {
      const list = document.getElementById('upcomingList');
      const t2 = new Date();
      const today2 = `${t2.getFullYear()}-${String(t2.getMonth()+1).padStart(2,'0')}-${String(t2.getDate()).padStart(2,'0')}`;
      const up = schedules.filter(s => s.event_date >= today2).slice(0, 4);
      
      if (!up.length) { 
        list.innerHTML = '<p class="text-sm font-semibold text-brandSub/70">예정되어 있는 일정이 없습니다.</p>'; 
        return; 
      }
      
      list.innerHTML = up.map(ev => {
        const c = ev.color || TYPE_COLORS[ev.event_type] || '#DAD1FE';
        const l = TYPE_LABELS[ev.event_type] || ev.event_type;
        const t = ev.event_time ? ev.event_time.slice(0,5) : '';
        const dd = new Date(ev.event_date+'T00:00:00');
        const ds = `${dd.getMonth()+1}/${dd.getDate()} (${DAYS[dd.getDay()]})`;
        
        return `
          <div class="flex items-center gap-4 p-5 bg-white rounded-2xl border border-line/45 hover:border-themePurple transition cursor-pointer" onclick="showEvent('${ev.id}')">
            <div class="w-1.5 h-10 rounded-full flex-shrink-0" style="background:${c}"></div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-brandDark text-sm">${ev.title}</div>
              <div class="text-xs font-semibold text-brandSub mt-1">${ds} ${t ? '· ' + t : ''}</div>
            </div>
            <span class="text-xs font-bold px-3 py-1.5 rounded-full flex-shrink-0" style="background:${c}25;color:#1E1B2C">${l}</span>
          </div>`;
      }).join('');
    }

    function showEvent(id) {
      const ev = schedules.find(s => s.id === id);
      if (!ev) return;
      const c = ev.color || TYPE_COLORS[ev.event_type] || '#DAD1FE';
      const l = TYPE_LABELS[ev.event_type] || ev.event_type;
      const dd = new Date(ev.event_date+'T00:00:00');
      const ds = `${currentYear}년 ${dd.getMonth()+1}월 ${dd.getDate()}일 (${DAYS[dd.getDay()]})`;
      document.getElementById('modalColor').style.background = c;
      document.getElementById('modalType').textContent = l;
      document.getElementById('modalTitle').textContent = ev.title;
      document.getElementById('modalDate').textContent = ds;
      document.getElementById('modalTime').textContent = ev.event_time ? ev.event_time.slice(0,5) : '';
      document.getElementById('modalDesc').textContent = ev.description || '상세 일정 설명이 등록되어 있지 않습니다.';
      document.getElementById('eventModal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === e.currentTarget) document.getElementById('eventModal').classList.remove('open');
    }

    function changeMonth(o) {
      currentMonth += o;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      loadMonth();
    }

    init();
  </script>
</body>
